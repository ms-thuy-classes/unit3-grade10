<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz – Unit 3 | Grade 10</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --purple: #c084fc;
    --pink: #f472b6;
    --blue: #60a5fa;
    --yellow: #fde68a;
    --mint: #6ee7b7;
    --bg: #fdf4ff;
    --card: #ffffff;
    --text: #3b2468;
    --subtext: #7c5cbf;
    --radius: 24px;
    --shadow: 0 8px 40px rgba(160,100,220,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    /* CHỈNH SỬA TẠI ĐÂY: Thay đổi cách căn giữa để cho phép cuộn */
    display: block; 
    overflow-x: hidden; 
    overflow-y: auto; /* Cho phép cuộn dọc */
    position: relative;
    padding: 20px 0; /* Tạo khoảng cách trên dưới khi cuộn */
  }

  /* Tạo container để căn giữa card thay vì dùng body */
  .main-container {
    display: flex;
    justify-content: center;
    align-items: flex-start; /* Để card bắt đầu từ trên nếu quá dài */
    min-height: 100vh;
    width: 100%;
    padding: 10px;
  }

  /* Các hiệu ứng nền giữ nguyên nhưng đổi position fixed */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.35;
    pointer-events: none;
    z-index: -1; /* Đưa xuống dưới cùng */
    animation: float 8s ease-in-out infinite alternate;
  }
  body::before {
    width: 500px; height: 500px;
    background: radial-gradient(circle, #e879f9, #a78bfa);
    top: -150px; left: -150px;
  }
  body::after {
    width: 400px; height: 400px;
    background: radial-gradient(circle, #60a5fa, #34d399);
    bottom: -100px; right: -100px;
    animation-delay: -4s;
  }

  @keyframes float {
    from { transform: translate(0,0) scale(1); }
    to   { transform: translate(40px, 30px) scale(1.08); }
  }

  .sparkle {
    position: fixed;
    width: 6px; height: 6px;
    border-radius: 50%;
    pointer-events: none;
    z-index: -1;
    animation: twinkle 3s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: 1; transform: scale(1.5); }
  }

  .card {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: var(--radius);
    box-shadow: var(--shadow), 0 0 0 1.5px rgba(192,132,252,0.18);
    padding: 40px 30px;
    max-width: 600px;
    width: 95%;
    position: relative;
    z-index: 10;
    margin: auto; /* Căn giữa trong container */
    animation: slideUp 0.5s cubic-bezier(.34,1.56,.64,1) both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(40px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* CSS cho Start Screen */
  #start-screen { text-align: center; }
  .logo-badge {
    display: inline-block;
    background: linear-gradient(135deg, #c084fc, #f472b6);
    color: #fff;
    font-family: 'Baloo 2', cursive;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 2px;
    padding: 5px 18px;
    border-radius: 100px;
    margin-bottom: 18px;
    text-transform: uppercase;
  }
  h1.title {
    font-family: 'Baloo 2', cursive;
    font-size: 2rem;
    font-weight: 800;
    background: linear-gradient(135deg, #a855f7, #ec4899, #3b82f6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
    line-height: 1.2;
  }
  .subtitle {
    color: var(--subtext);
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 30px;
  }

  .input-group { position: relative; margin-bottom: 24px; text-align: left; }
  .input-group label {
    display: block;
    font-weight: 700;
    color: var(--subtext);
    font-size: 14px;
    margin-bottom: 8px;
  }
  .input-group input {
    width: 100%;
    padding: 14px 20px;
    border: 2px solid #e9d5ff;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 700;
    outline: none;
    transition: 0.2s;
  }
  .input-group input:focus { border-color: var(--purple); box-shadow: 0 0 0 4px rgba(192,132,252,0.15); }

  .btn-start, .btn-next, .btn-retry {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, #a855f7, #ec4899);
    color: #fff;
    font-family: 'Baloo 2', cursive;
    font-size: 18px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(168,85,247,0.3);
  }

  /* Quiz Screen Elements */
  #quiz-screen { display: none; }
  .quiz-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
  .student-name { background: #ede9fe; padding: 4px 12px; border-radius: 100px; font-size: 13px; font-weight: 700; color: var(--subtext); }
  .progress-wrap { background: #ede9fe; border-radius: 100px; height: 10px; margin-bottom: 20px; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, #a855f7, #ec4899); transition: width 0.3s; }

  .timer-wrap { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; }
  .timer-ring { position: relative; width: 50px; height: 50px; }
  .timer-ring svg { transform: rotate(-90deg); width: 50px; height: 50px; }
  .timer-ring circle { fill: none; stroke: #ede9fe; stroke-width: 4; }
  .timer-ring .arc { stroke: #a855f7; stroke-dasharray: 138; stroke-linecap: round; transition: 1s linear; }
  .timer-num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-weight: 800; font-family: 'Baloo 2'; }

  .question-block { background: #f5f3ff; border-radius: 18px; padding: 20px; border: 1.5px solid #e9d5ff; margin-bottom: 20px; }
  .question-text { font-size: 16px; font-weight: 700; line-height: 1.5; color: var(--text); }

  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (max-width: 480px) { 
    .options-grid { grid-template-columns: 1fr; } 
    .card { padding: 30px 20px; }
  }

  .option-btn {
    padding: 12px 15px;
    border: 2px solid #e9d5ff;
    border-radius: 12px;
    background: white;
    text-align: left;
    font-family: inherit;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: 0.2s;
  }
  .option-btn.selected { border-color: var(--purple); background: #f5f3ff; }
  .option-letter { background: #ede9fe; width: 25px; height: 25px; display: flex; align-items: center; justify-content: center; border-radius: 6px; color: var(--purple); font-size: 12px; }

  .feedback { margin-top: 15px; padding: 10px; border-radius: 10px; text-align: center; font-family: 'Baloo 2'; font-size: 20px; display: none; }
  .feedback.show { display: block; }
  .feedback.correct { background: #d1fae5; color: #065f46; }
  .feedback.wrong { background: #fce7f3; color: #9d174d; }

  #result-screen { display: none; text-align: center; }
  .score-main { font-size: 3rem; font-family: 'Baloo 2'; font-weight: 800; color: var(--purple); }

  .confetti-piece { position: fixed; pointer-events: none; z-index: 999; animation: fall linear forwards; }
  @keyframes fall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
</style>
</head>
<body>

<div class="main-container">
  <div class="card" id="app">

    <div id="start-screen" class="screen">
      <div class="logo-badge">Grade 10 · Unit 3</div>
      <h1 class="title">International<br>Organisations 🌍</h1>
      <p class="subtitle">Kiểm tra từ vựng & ngữ pháp</p>
      <div class="input-group">
        <label for="name-input">✏️ Tên học sinh của bạn</label>
        <input type="text" id="name-input" placeholder="Nhập tên..." maxlength="40">
      </div>
      <button class="btn-start" onclick="startQuiz()">🚀 Bắt đầu làm bài!</button>
      <div style="display:flex; gap:10px; justify-content:center; margin-top:20px; flex-wrap:wrap;">
        <span style="font-size:12px; background:#ede9fe; padding:4px 10px; border-radius:100px; font-weight:700;">📝 40 câu</span>
        <span style="font-size:12px; background:#ede9fe; padding:4px 10px; border-radius:100px; font-weight:700;">⏱️ 15s/câu</span>
      </div>
    </div>

    <div id="quiz-screen" class="screen">
      <div class="quiz-header">
        <div class="student-name" id="display-name">Học sinh</div>
        <div style="font-weight:800; color:var(--subtext); font-size:14px;"><span id="q-current">1</span> / 40</div>
      </div>
      <div class="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
      
      <div class="timer-wrap">
        <div class="timer-ring">
          <svg><circle cx="25" cy="25" r="22"/><circle class="arc" id="timer-arc" cx="25" cy="25" r="22"/></svg>
          <div class="timer-num" id="timer-num">15</div>
        </div>
      </div>

      <div class="question-block">
        <div id="question-text" class="question-text"></div>
      </div>
      <div class="options-grid" id="options-grid"></div>
      <div class="feedback" id="feedback"></div>
      <button class="btn-next" id="btn-next" onclick="nextQuestion()" style="display:none; margin-top:15px;">Tiếp tục →</button>
    </div>

    <div id="result-screen" class="screen">
      <div style="font-size:60px;" id="result-emoji">🎉</div>
      <h2 class="title" style="font-size:1.5rem;">Kết quả bài thi</h2>
      <div id="result-name" style="margin-bottom:15px; font-weight:700;"></div>
      <div style="background:#fdf4ff; padding:20px; border-radius:20px; border:2px solid #e9d5ff; margin-bottom:20px;">
        <div class="score-main" id="score-main">0</div>
        <div style="font-weight:700; color:var(--subtext);">Điểm số / 10</div>
        <div style="font-size:14px; margin-top:10px;">Đúng: <span id="score-correct">0</span> / 40 câu</div>
      </div>
      <div id="praise-text" style="font-weight:700; margin-bottom:20px; line-height:1.4;"></div>
      <button class="btn-retry" onclick="location.reload()">🔄 Làm lại bài</button>
    </div>

  </div>
</div>

<script>
// (Toàn bộ phần Script của bạn giữ nguyên, chỉ sửa lại logic hiển thị một chút để mượt hơn)
const RAW_QUESTIONS = [
  {q:"Choose the word whose underlined part differs. (chữ e)",opts:["trade","dentist","economic","danger"],ans:"B"},
  {q:"Choose the word whose underlined part differs. (chữ ch)",opts:["charity","chemistry","chaos","chair"],ans:"B"},
  {q:"Choose the word with different stress.",opts:["economic","quality","independent","regional"],ans:"A"},
  {q:"Choose the word with different stress.",opts:["investor","environment","international","economic"],ans:"A"},
  {q:"Viet Nam is a member of many international ______.",opts:["businesses","communities","programmes","organisations"],ans:"D"},
  {q:"UNICEF has helped many ______ teenagers.",opts:["active","advantaged","disadvantaged","talented"],ans:"C"},
  {q:"Viet Nam has participated ______ many UN activities.",opts:["in","on","for","with"],ans:"A"},
  {q:"UNICEF's aim is to protect children and ______ they are healthy.",opts:["make sure","do sure","give sure","show sure"],ans:"A"},
  {q:"The WTO is the world's largest international ______ organisation.",opts:["economy","economic","economical","economist"],ans:"B"},
  {q:"Joining the WTO has helped Viet Nam ______ its economic growth.",opts:["provide","promote","prevent","predict"],ans:"B"},
  {q:"The ______ accident occurred last night.",opts:["badest","most bad","worse","worst"],ans:"D"},
  {q:"We ______ to use donations effectively.",opts:["comment","accept","commit","preserve"],ans:"C"},
  {q:"This organisation ______ to protect forests.",opts:["rises","bombs","aims","spreads"],ans:"C"},
  {q:"The United Nations ______ in 1945.",opts:["create","created","was created","to create"],ans:"C"},
  {q:"UN Peacekeeping aims ______ countries affected by war.",opts:["help","to help","helping","helps"],ans:"B"},
  {q:"Through ______ activities, Viet Nam helped achieve peace.",opts:["interesting","peacekeeping","exciting","influencing"],ans:"B"},
  {q:"Goods can ______ new markets.",opts:["enter","entering","to enter","enters"],ans:"A"},
  {q:"Children have a chance to ______ education.",opts:["get used to","get on with","get acquainted with","get access to"],ans:"D"},
  {q:"The programme promotes equal ______.",opts:["participate","participant","participation","participating"],ans:"C"},
  {q:"Viet Nam ______ foreign investors.",opts:["expresses","welcomes","hesitates","promotes"],ans:"B"},
  {q:"The Red Cross's main ______ is protection.",opts:["mission","experience","organization","rule"],ans:"A"},
  {q:"People choose ______ time for important things.",opts:["better","less good","the least good","the best"],ans:"D"},
  {q:"The organisation relieves human ______.",opts:["protection","enjoyment","wealthy","sufferings"],ans:"D"},
  {q:"Many people live in absolute ______.",opts:["poor","poorer","poorly","poverty"],ans:"D"},
  {q:"Mary speaks English very ______.",opts:["fluent","fluently","more fluently","most fluently"],ans:"B"},
  {q:"The purpose of international organisations is ______.",opts:["keep world safe","isolate countries","cause wars","none"],ans:"A"},
  {q:"International cooperation maintains global ______.",opts:["peace","war","conflict","damage"],ans:"A"},
  {q:"Education improves living ______.",opts:["standards","dangers","missions","poverty"],ans:"A"},
  {q:"Organisations promote ______ development.",opts:["sustainable","dangerous","temporary","local"],ans:"A"},
  {q:"Countries solve ______ problems together.",opts:["global","private","personal","small"],ans:"A"},
  {q:"Aid helps people in ______.",opts:["need","wealth","comfort","luxury"],ans:"A"},
  {q:"UNICEF focuses on children's ______.",opts:["rights","weapons","conflicts","trade"],ans:"A"},
  {q:"Economic growth creates more ______.",opts:["jobs","wars","diseases","risks"],ans:"A"},
  {q:"Peacekeeping forces stop ______.",opts:["violence","learning","growth","study"],ans:"A"},
  {q:"International trade boosts the ______.",opts:["economy","poverty","conflict","danger"],ans:"A"},
  {q:"Countries cooperate for mutual ______.",opts:["benefit","loss","fight","damage"],ans:"A"},
  {q:"Global cooperation reduces ______.",opts:["poverty","education","health","culture"],ans:"A"},
  {q:"Aid programmes support ______ communities.",opts:["disadvantaged","wealthy","modern","private"],ans:"A"},
  {q:"Education gives better ______.",opts:["opportunities","wars","losses","risks"],ans:"A"},
  {q:"International law maintains world ______.",opts:["order","chaos","violence","damage"],ans:"A"},
];

let questions = [];
let currentIdx = 0;
let score = 0;
let timer = null;
let timeLeft = 15;
let answered = false;

function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

function startQuiz() {
  const name = document.getElementById('name-input').value.trim();
  if(!name) return alert("Nhập tên nhé!");
  questions = shuffle([...RAW_QUESTIONS]).map(q => {
    const correctText = q.opts[['A','B','C','D'].indexOf(q.ans)];
    const shufOpts = shuffle([...q.opts]);
    return { q: q.q, opts: shufOpts, ansLetter: ['A','B','C','D'][shufOpts.indexOf(correctText)] };
  });
  document.getElementById('display-name').textContent = "👤 " + name;
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  loadQuestion();
}

function loadQuestion() {
  answered = false;
  const q = questions[currentIdx];
  document.getElementById('q-current').textContent = currentIdx + 1;
  document.getElementById('progress-bar').style.width = (currentIdx / 40 * 100) + "%";
  document.getElementById('question-text').textContent = q.q;
  
  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const letter = ['A','B','C','D'][i];
    grid.innerHTML += `<button class="option-btn" onclick="selectAnswer('${letter}', this)">
      <span class="option-letter">${letter}</span> <span>${opt}</span>
    </button>`;
  });
  
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('btn-next').style.display = 'none';
  startTimer();
}

function startTimer() {
  timeLeft = 15;
  updateTimerUI();
  clearInterval(timer);
  timer = setInterval(() => {
    timeLeft--;
    updateTimerUI();
    if(timeLeft <= 0) { clearInterval(timer); if(!answered) selectAnswer(null, null); }
  }, 1000);
}

function updateTimerUI() {
  document.getElementById('timer-num').textContent = timeLeft;
  const offset = 138 * (1 - timeLeft/15);
  document.getElementById('timer-arc').style.strokeDashoffset = offset;
}

function selectAnswer(letter, btn) {
  if(answered) return;
  answered = true;
  clearInterval(timer);
  const correctLetter = questions[currentIdx].ansLetter;
  const isCorrect = letter === correctLetter;
  if(isCorrect) score++;
  
  if(btn) btn.classList.add('selected');
  const fb = document.getElementById('feedback');
  fb.textContent = isCorrect ? "😊 Chính xác!" : "😢 Sai rồi! Đáp án là " + correctLetter;
  fb.className = 'feedback show ' + (isCorrect ? 'correct' : 'wrong');
  document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
  document.getElementById('btn-next').style.display = 'block';
}

function nextQuestion() {
  currentIdx++;
  if(currentIdx < 40) loadQuestion(); else showResult();
}

function showResult() {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  const final = (score/40*10).toFixed(1);
  document.getElementById('score-main').textContent = final;
  document.getElementById('score-correct').textContent = score;
  document.getElementById('result-name').textContent = "Học sinh: " + document.getElementById('name-input').value;
  document.getElementById('praise-text').textContent = final >= 8 ? "Tuyệt vời! Bạn thật xuất sắc! 🌟" : (final >= 5 ? "Khá lắm! Cố gắng thêm chút nữa nhé! 💪" : "Đừng buồn, ôn tập lại và thử sức lần sau nhé! ✨");
  if(final >= 5) launchConfetti();
}

function launchConfetti() {
  for(let i=0; i<50; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = Math.random()*100 + "vw";
    p.style.top = "-5vh";
    p.style.backgroundColor = ['#c084fc','#f472b6','#60a5fa','#fde68a'][Math.floor(Math.random()*4)];
    p.style.width = Math.random()*10+5+"px";
    p.style.height = p.style.width;
    p.style.animationDuration = Math.random()*2+2+"s";
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 4000);
  }
}
</script>

</body>
</html>
