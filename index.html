<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz – Unit 3 | Grade 10</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --purple: #c084fc;
    --pink: #f472b6;
    --blue: #60a5fa;
    --bg: #fdf4ff;
    --text: #3b2468;
    --subtext: #7c5cbf;
    --radius: 24px;
    --shadow: 0 8px 40px rgba(160,100,220,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: block; 
    overflow-x: hidden; 
    overflow-y: auto; /* Cuộn trang mượt mà */
    position: relative;
    padding: 20px 0;
  }

  .main-container {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    width: 100%;
    padding: 10px;
  }

  /* Card */
  .card {
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 30px 20px;
    max-width: 600px;
    width: 95%;
    margin: auto;
    z-index: 10;
    position: relative;
  }

  h1.title {
    font-family: 'Baloo 2', cursive;
    font-size: 1.8rem;
    background: linear-gradient(135deg, #a855f7, #ec4899);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-align: center; margin-bottom: 20px;
  }

  /* Quiz Styles */
  .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
  .progress-wrap { background: #ede9fe; height: 10px; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
  .progress-bar { height: 100%; background: #a855f7; width: 0%; transition: 0.3s; }

  .question-block { background: #f5f3ff; padding: 20px; border-radius: 15px; border: 1.5px solid #e9d5ff; margin-bottom: 20px; }
  .question-text { font-size: 17px; font-weight: 700; color: var(--text); line-height: 1.5; }

  .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
  @media (min-width: 480px) { .options-grid { grid-template-columns: 1fr 1fr; } }

  .option-btn {
    padding: 12px; border: 2px solid #e9d5ff; border-radius: 12px;
    background: #fff; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 10px;
    font-family: inherit; font-weight: 700; transition: 0.2s;
  }
  
  /* Màu sắc khi chọn */
  .option-btn.correct-glow { border-color: #10b981; background: #ecfdf5; }
  .option-btn.wrong-glow { border-color: #ef4444; background: #fef2f2; }
  .option-letter { background: #ede9fe; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 8px; color: #a855f7; }

  .feedback { margin-top: 15px; padding: 12px; border-radius: 10px; text-align: center; font-family: 'Baloo 2'; font-size: 18px; display: none; }
  .feedback.correct { display: block; background: #d1fae5; color: #065f46; }
  .feedback.wrong { display: block; background: #fce7f3; color: #9d174d; }

  .btn-start, .btn-next, .btn-retry {
    width: 100%; padding: 15px; border: none; border-radius: 12px;
    background: linear-gradient(135deg, #a855f7, #ec4899);
    color: #fff; font-family: 'Baloo 2'; font-size: 18px; font-weight: 800;
    cursor: pointer; margin-top: 10px;
  }

  #quiz-screen, #result-screen { display: none; }
</style>
</head>
<body>

<div class="main-container">
  <div class="card">
    
    <div id="start-screen">
      <h1 class="title">International Organisations 🌍</h1>
      <div style="margin-bottom: 20px;">
        <label style="display:block; font-weight:800; margin-bottom:8px; color:var(--subtext)">✏️ Tên của bạn:</label>
        <input type="text" id="name-input" style="width:100%; padding:12px; border:2px solid #e9d5ff; border-radius:12px; outline:none;" placeholder="Nhập tên...">
      </div>
      <button class="btn-start" onclick="startQuiz()">🚀 Bắt đầu</button>
    </div>

    <div id="quiz-screen">
      <div class="quiz-header">
        <span id="display-name" style="font-weight:700; color:var(--subtext)"></span>
        <span style="font-weight:800;">Câu <span id="q-current">1</span>/40</span>
      </div>
      <div class="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
      <div class="question-block">
        <p id="question-text" class="question-text"></p>
      </div>
      <div id="options-grid" class="options-grid"></div>
      <div id="feedback" class="feedback"></div>
      <button id="btn-next" class="btn-next" onclick="nextQuestion()" style="display:none;">Tiếp tục →</button>
    </div>

    <div id="result-screen" style="text-align:center;">
      <h2 class="title">Kết Quả</h2>
      <div style="font-size:3.5rem; font-family:'Baloo 2'; color:#a855f7; font-weight:800;" id="score-main">0</div>
      <p id="result-info" style="font-weight:700; margin-bottom:20px; color:var(--subtext)"></p>
      <button class="btn-retry" onclick="location.reload()">🔄 Thử lại bài tập</button>
    </div>

  </div>
</div>

<script>
// (Dữ liệu RAW_QUESTIONS giữ nguyên giống như file gốc của bạn)
const RAW_QUESTIONS = [
    {q:"Choose the word whose underlined part differs. (chữ e)",opts:["trade","dentist","economic","danger"],ans:"B"},
    {q:"Choose the word whose underlined part differs. (chữ ch)",opts:["charity","chemistry","chaos","chair"],ans:"B"},
    {q:"Choose the word with different stress.",opts:["economic","quality","independent","regional"],ans:"A"},
    {q:"Choose the word with different stress.",opts:["investor","environment","international","economic"],ans:"A"},
    {q:"Viet Nam is a member of many international ______.",opts:["businesses","communities","programmes","organisations"],ans:"D"},
    {q:"UNICEF has helped many ______ teenagers.",opts:["active","advantaged","disadvantaged","talented"],ans:"C"},
    {q:"Viet Nam has participated ______ many UN activities.",opts:["in","on","for","with"],ans:"A"},
    {q:"UNICEF's aim is to protect children and ______ they are healthy.",opts:["make sure","do sure","give sure","show sure"],ans:"A"},
    {q:"The WTO is the world's largest international ______ organisation.",opts:["economy","economic","economical","economist"],ans:"B"},
    {q:"Joining the WTO has helped Viet Nam ______ its economic growth.",opts:["provide","promote","prevent","predict"],ans:"B"},
    {q:"The ______ accident occurred last night.",opts:["badest","most bad","worse","worst"],ans:"D"},
    {q:"We ______ to use donations effectively.",opts:["comment","accept","commit","preserve"],ans:"C"},
    {q:"This organisation ______ to protect forests.",opts:["rises","bombs","aims","spreads"],ans:"C"},
    {q:"The United Nations ______ in 1945.",opts:["create","created","was created","to create"],ans:"C"},
    {q:"UN Peacekeeping aims ______ countries affected by war.",opts:["help","to help","helping","helps"],ans:"B"},
    {q:"Through ______ activities, Viet Nam helped achieve peace.",opts:["interesting","peacekeeping","exciting","influencing"],ans:"B"},
    {q:"Goods can ______ new markets.",opts:["enter","entering","to enter","enters"],ans:"A"},
    {q:"Children have a chance to ______ education.",opts:["get used to","get on with","get acquainted with","get access to"],ans:"D"},
    {q:"The programme promotes equal ______.",opts:["participate","participant","participation","participating"],ans:"C"},
    {q:"Viet Nam ______ foreign investors.",opts:["expresses","welcomes","hesitates","promotes"],ans:"B"},
    {q:"The Red Cross's main ______ is protection.",opts:["mission","experience","organization","rule"],ans:"A"},
    {q:"People choose ______ time for important things.",opts:["better","less good","the least good","the best"],ans:"D"},
    {q:"The organisation relieves human ______.",opts:["protection","enjoyment","wealthy","sufferings"],ans:"D"},
    {q:"Many people live in absolute ______.",opts:["poor","poorer","poorly","poverty"],ans:"D"},
    {q:"Mary speaks English very ______.",opts:["fluent","fluently","more fluently","most fluently"],ans:"B"},
    {q:"The purpose of international organisations is ______.",opts:["keep world safe","isolate countries","cause wars","none"],ans:"A"},
    {q:"International cooperation maintains global ______.",opts:["peace","war","conflict","damage"],ans:"A"},
    {q:"Education improves living ______.",opts:["standards","dangers","missions","poverty"],ans:"A"},
    {q:"Organisations promote ______ development.",opts:["sustainable","dangerous","temporary","local"],ans:"A"},
    {q:"Countries solve ______ problems together.",opts:["global","private","personal","small"],ans:"A"},
    {q:"Aid helps people in ______.",opts:["need","wealth","comfort","luxury"],ans:"A"},
    {q:"UNICEF focuses on children's ______.",opts:["rights","weapons","conflicts","trade"],ans:"A"},
    {q:"Economic growth creates more ______.",opts:["jobs","wars","diseases","risks"],ans:"A"},
    {q:"Peacekeeping forces stop ______.",opts:["violence","learning","growth","study"],ans:"A"},
    {q:"International trade boosts the ______.",opts:["economy","poverty","conflict","danger"],ans:"A"},
    {q:"Countries cooperate for mutual ______.",opts:["benefit","loss","fight","damage"],ans:"A"},
    {q:"Global cooperation reduces ______.",opts:["poverty","education","health","culture"],ans:"A"},
    {q:"Aid programmes support ______ communities.",opts:["disadvantaged","wealthy","modern","private"],ans:"A"},
    {q:"Education gives better ______.",opts:["opportunities","wars","losses","risks"],ans:"A"},
    {q:"International law maintains world ______.",opts:["order","chaos","violence","damage"],ans:"A"}
];

let questions = [];
let currentIdx = 0;
let score = 0;
let answered = false;

function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

function startQuiz() {
  const nameInput = document.getElementById('name-input');
  if(!nameInput.value.trim()) return alert("Vui lòng nhập tên!");
  
  questions = shuffle([...RAW_QUESTIONS]).map(q => {
    const correctText = q.opts[['A','B','C','D'].indexOf(q.ans)];
    const shuffledOpts = shuffle([...q.opts]);
    return { q: q.q, opts: shuffledOpts, ansIndex: shuffledOpts.indexOf(correctText) };
  });

  document.getElementById('display-name').textContent = "👤 " + nameInput.value;
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  loadQuestion();
}

function loadQuestion() {
  answered = false;
  const q = questions[currentIdx];
  document.getElementById('q-current').textContent = currentIdx + 1;
  document.getElementById('progress-bar').style.width = (currentIdx / 40 * 100) + "%";
  document.getElementById('question-text').textContent = q.q;
  
  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  q.opts.forEach((opt, i) => {
    grid.innerHTML += `
      <button class="option-btn" id="opt-${i}" onclick="selectAnswer(${i})">
        <span class="option-letter">${['A','B','C','D'][i]}</span>
        <span>${opt}</span>
      </button>`;
  });
  
  document.getElementById('feedback').style.display = 'none';
  document.getElementById('btn-next').style.display = 'none';
}

function selectAnswer(idx) {
  if(answered) return;
  answered = true;
  
  const q = questions[currentIdx];
  const isCorrect = idx === q.ansIndex;

  if(isCorrect) {
    score++;
    document.getElementById(`opt-${idx}`).classList.add('correct-glow');
    showFeedback(true, "😊 Chính xác! Tuyệt vời!");
  } else {
    // CHỈNH SỬA TẠI ĐÂY: Không hiện đáp án đúng, chỉ báo là sai
    document.getElementById(`opt-${idx}`).classList.add('wrong-glow');
    showFeedback(false, "😢 Chưa đúng rồi! Hãy cố gắng ở câu sau nhé!");
  }

  document.querySelectorAll('.option-btn').forEach(btn => btn.disabled = true);
  document.getElementById('btn-next').style.display = 'block';
}

function showFeedback(isCorrect, text) {
  const fb = document.getElementById('feedback');
  fb.textContent = text;
  fb.className = isCorrect ? 'feedback correct' : 'feedback wrong';
}

function nextQuestion() {
  currentIdx++;
  if(currentIdx < 40) loadQuestion(); else showResult();
}

function showResult() {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  const finalScore = (score/40*10).toFixed(1);
  document.getElementById('score-main').textContent = finalScore;
  document.getElementById('result-info').textContent = `Kết quả: Đúng ${score} trên 40 câu.`;
}
</script>
</body>
</html>
